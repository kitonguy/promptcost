<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="10" y="10" width="780" height="220" rx="24" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="780" height="220" rx="24" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- Dollar coin -->
  <g transform="translate(70, 120)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="68" fill="#22c55e" opacity="0.08"/>
    <!-- Main circle -->
    <circle cx="0" cy="0" r="52" fill="url(#coinGrad)"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Dollar sign -->
    <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle">$</text>
  </g>
  <!-- Text: Prompt -->
  <text x="200" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)">Prompt</text>
  <!-- Text: Cost -->
  <text x="200" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accentGrad)">Cost</text>
  <!-- .org -->
  <text x="568" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#64748b">.org</text>
  <!-- Tagline -->
  <text x="200" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b" letter-spacing="2">AI TOKEN CALCULATOR</text>
</svg>