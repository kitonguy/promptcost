<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Down arrow icon -->
  <g transform="translate(80, 120)">
    <circle cx="50" cy="50" r="45" fill="#10b981" opacity="0.2"/>
    <path d="M50 80 L30 50 L45 50 L45 30 L55 30 L55 50 L70 50 Z" fill="#10b981"/>
  </g>
  
  <!-- Main headline -->
  <text x="600" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fff" text-anchor="middle">
    Enterprise AI Costs
  </text>
  <text x="600" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent)" text-anchor="middle">
    DROP 67%
  </text>
  <text x="600" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">
    The Multi-Model Revolution in 2026
  </text>
  
  <!-- Metrics boxes -->
  <g transform="translate(100, 360)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="240" height="140" rx="12" fill="#10b981" opacity="0.15"/>
    <rect x="0" y="0" width="240" height="140" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="120" y="50" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#10b981" text-anchor="middle">$1M → $330K</text>
    <text x="120" y="85" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Monthly spend reduction</text>
    <text x="120" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Equivalent output quality</text>
  </g>
  
  <g transform="translate(370, 360)">
    <!-- Box 2 -->
    <rect x="0" y="0" width="240" height="140" rx="12" fill="#3b82f6" opacity="0.15"/>
    <rect x="0" y="0" width="240" height="140" rx="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="120" y="50" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#3b82f6" text-anchor="middle">DeepSeek V3</text>
    <text x="120" y="85" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">$0.38 / $0.13</text>
    <text x="120" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Per million tokens</text>
  </g>
  
  <g transform="translate(640, 360)">
    <!-- Box 3 -->
    <rect x="0" y="0" width="240" height="140" rx="12" fill="#8b5cf6" opacity="0.15"/>
    <rect x="0" y="0" width="240" height="140" rx="12" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="120" y="50" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#8b5cf6" text-anchor="middle">GPT-5 Nano</text>
    <text x="120" y="85" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">$0.11 / $0.04</text>
    <text x="120" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Best budget option</text>
  </g>
  
  <g transform="translate(910, 360)">
    <!-- Box 4 -->
    <rect x="0" y="0" width="190" height="140" rx="12" fill="#f59e0b" opacity="0.15"/>
    <rect x="0" y="0" width="190" height="140" rx="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="95" y="50" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#f59e0b" text-anchor="middle">125×</text>
    <text x="95" y="85" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Cost gap</text>
    <text x="95" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Nano vs Opus 4.6</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">
    promptcost.org
  </text>
  <text x="1120" y="580" font-family="system-ui, sans-serif" font-size="16" fill="#475569" text-anchor="end">
    AI Token Calculator &amp; GPU Comparison
  </text>
</svg>