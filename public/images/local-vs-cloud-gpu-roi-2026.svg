<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-2026" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="local-2026" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="cloud-2026" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="roi-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-2026)"/>
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="20" font-weight="700">Local vs Cloud GPU ROI — 2026 Analysis</text>
  <!-- Local Card -->
  <rect x="20" y="55" width="370" height="300" rx="12" fill="url(#local-2026)"/>
  <text x="205" y="85" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">Own RTX 4090 x2</text>
  <text x="205" y="108" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="12">Dual GPU Setup</text>
  <text x="205" y="148" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="30" font-weight="800">$4,200</text>
  <text x="205" y="172" text-anchor="middle" fill="#a7f3d0" font-family="system-ui" font-size="13">One-Time Investment</text>
  <!-- Local Specs -->
  <text x="205" y="205" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">48GB VRAM Combined</text>
  <text x="205" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">~$0.18/hr electricity only</text>
  <text x="205" y="248" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="11">✓ 24/7 availability</text>
  <text x="205" y="266" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="11">✓ Full data privacy</text>
  <text x="205" y="284" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="11">✓ No spot interruption</text>
  <text x="205" y="308" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="12" font-weight="700">ROI: 8-10 months</text>
  <text x="205" y="340" text-anchor="middle" fill="#a7f3d0" font-family="system-ui" font-size="11">Best: 6+ hrs/day inference</text>
  <!-- Cloud Card -->
  <rect x="410" y="55" width="370" height="300" rx="12" fill="url(#cloud-2026)"/>
  <text x="595" y="85" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">Cloud H100 On-Demand</text>
  <text x="595" y="108" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="12">Elastic Rental</text>
  <text x="595" y="148" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="30" font-weight="800">$2.80</text>
  <text x="595" y="172" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="13">per hour — no upfront</text>
  <!-- Cloud Specs -->
  <text x="595" y="205" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">80GB VRAM available</text>
  <text x="595" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">NVLink interconnect</text>
  <text x="595" y="248" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">✓ Scale 1-128 GPUs</text>
  <text x="595" y="266" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">✓ No hardware maintenance</text>
  <text x="595" y="284" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">✓ Access enterprise GPUs</text>
  <text x="595" y="308" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="12">Pay forever — no ROI</text>
  <text x="595" y="340" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">Best: Fine-tuning, 80GB+ needs</text>
  <!-- ROI Timeline Bar -->
  <rect x="50" y="370" width="700" height="22" rx="6" fill="#1e293b"/>
  <rect x="50" y="370" width="280" height="22" rx="6" fill="url(#roi-bar)"/>
  <text x="400" y="385" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="11" font-weight="600">Break-even at 8-10 months — Local wins after</text>
</svg>