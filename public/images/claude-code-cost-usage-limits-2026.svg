<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Logo text -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="24" fill="#e94560" font-weight="bold">PromptCost.org</text>

  <!-- Main title -->
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="56" fill="#ffffff" font-weight="bold">Claude Code</text>
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="56" fill="#ffffff" font-weight="bold">Usage Limits</text>

  <!-- Subtitle -->
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0">What Engineers Actually Pay in 2026</text>

  <!-- Key metrics boxes -->
  <rect x="60" y="320" width="250" height="120" rx="12" fill="#1e3a5f"/>
  <text x="185" y="365" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="bold">$100</text>
  <text x="185" y="410" font-family="Arial, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">Pro / month</text>

  <rect x="330" y="320" width="250" height="120" rx="12" fill="#1e3a5f"/>
  <text x="455" y="365" font-family="Arial, sans-serif" font-size="48" fill="#e94560" text-anchor="middle" font-weight="bold">2-3h</text>
  <text x="455" y="410" font-family="Arial, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">Daily limit for power users</text>

  <rect x="600" y="320" width="250" height="120" rx="12" fill="#1e3a5f"/>
  <text x="725" y="365" font-family="Arial, sans-serif" font-size="48" fill="#4ade80" text-anchor="middle" font-weight="bold">FREE</text>
  <text x="725" y="410" font-family="Arial, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">Nemotron 3 Nano</text>

  <rect x="870" y="320" width="270" height="120" rx="12" fill="#1e3a5f"/>
  <text x="1005" y="365" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="bold">35x</text>
  <text x="1005" y="410" font-family="Arial, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">Kimi K2.6 vs Claude</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0f0f1a"/>
  <text x="60" y="605" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">promptcost.org/en/blog/claude-code-cost-usage-limits-2026</text>
  <text x="1140" y="605" font-family="Arial, sans-serif" font-size="22" fill="#e94560" text-anchor="end">May 2026</text>
</svg>
