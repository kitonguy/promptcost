<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bgGrad)" width="1200" height="630"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#2563eb" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#d97706" opacity="0.08"/>
  
  <!-- Main title -->
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="bold">How Much Does</text>
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" fill="url(#accentGrad)" text-anchor="middle" font-weight="bold">Claude 3.5 Sonnet</text>
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="bold">Cost in 2026?</text>
  
  <!-- Pricing boxes -->
  <rect x="150" y="320" width="280" height="120" rx="12" fill="#2563eb" opacity="0.3"/>
  <rect x="155" y="325" width="270" height="110" rx="10" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="290" y="365" font-family="system-ui, sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle">Input Tokens</text>
  <text x="290" y="410" font-family="system-ui, sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">$3.00</text>
  <text x="290" y="435" font-family="system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">per 1M tokens</text>
  
  <rect x="460" y="320" width="280" height="120" rx="12" fill="#dc2626" opacity="0.2"/>
  <rect x="465" y="325" width="270" height="110" rx="10" fill="none" stroke="#f87171" stroke-width="2"/>
  <text x="600" y="365" font-family="system-ui, sans-serif" font-size="18" fill="#fca5a5" text-anchor="middle">Output Tokens</text>
  <text x="600" y="410" font-family="system-ui, sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">$15.00</text>
  <text x="600" y="435" font-family="system-ui, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">per 1M tokens</text>
  
  <rect x="770" y="320" width="280" height="120" rx="12" fill="#059669" opacity="0.2"/>
  <rect x="775" y="325" width="270" height="110" rx="10" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="910" y="365" font-family="system-ui, sans-serif" font-size="18" fill="#6ee7b7" text-anchor="middle">Context Window</text>
  <text x="910" y="410" font-family="system-ui, sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">200K</text>
  <text x="910" y="435" font-family="system-ui, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">tokens max</text>
  
  <!-- Bottom tagline -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Complete API Pricing Guide 2026</text>
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">Learn how to reduce your bill by 40% with optimization strategies</text>
  
  <!-- PromptCost branding -->
  <text x="600" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#475569" text-anchor="middle">promptcost.org</text>
</svg>
