<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Sound wave visual -->
  <g transform="translate(80, 315)" opacity="0.15">
    <rect x="0" y="-120" width="18" height="240" rx="9" fill="#e94560"/>
    <rect x="30" y="-80" width="18" height="160" rx="9" fill="#e94560"/>
    <rect x="60" y="-140" width="18" height="280" rx="9" fill="#e94560"/>
    <rect x="90" y="-60" width="18" height="120" rx="9" fill="#e94560"/>
    <rect x="120" y="-100" width="18" height="200" rx="9" fill="#e94560"/>
    <rect x="150" y="-130" width="18" height="260" rx="9" fill="#e94560"/>
    <rect x="180" y="-70" width="18" height="140" rx="9" fill="#e94560"/>
    <rect x="210" y="-110" width="18" height="220" rx="9" fill="#e94560"/>
  </g>
  <!-- Title -->
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#ffffff" text-anchor="middle">Grok 4.3 Custom Voices</text>
  <text x="600" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="400" fill="url(#accent)" text-anchor="middle">API Pricing 2026</text>
  <!-- Divider -->
  <rect x="400" y="230" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Pricing boxes -->
  <g transform="translate(130, 280)">
    <rect width="280" height="160" rx="16" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="140" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#aaaaaa" text-anchor="middle">Input Tokens</text>
    <text x="140" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">$1.25</text>
    <text x="140" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle">per 1M tokens</text>
  </g>
  <g transform="translate(460, 280)">
    <rect width="280" height="160" rx="16" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="140" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#aaaaaa" text-anchor="middle">Output Tokens</text>
    <text x="140" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">$2.50</text>
    <text x="140" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle">per 1M tokens</text>
  </g>
  <g transform="translate(790, 280)">
    <rect width="280" height="160" rx="16" fill="url(#accent)" opacity="0.15" stroke="#e94560" stroke-opacity="0.3" stroke-width="1"/>
    <text x="140" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#ff9999" text-anchor="middle">Voice Cloning</text>
    <text x="140" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">2 min</text>
    <text x="140" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ff9999" text-anchor="middle">setup time</text>
  </g>
  <!-- Comparison bar -->
  <g transform="translate(130, 490)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#888888">vs GPT-4o Voice:</text>
    <text x="300" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#4ade80">52% cheaper</text>
    <rect x="0" y="15" width="940" height="6" rx="3" fill="#333355"/>
    <rect x="0" y="15" width="480" height="6" rx="3" fill="#4ade80" opacity="0.7"/>
  </g>
  <!-- Footer -->
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#555566" text-anchor="middle">promptcost.org — AI Cost Optimization Guide</text>
</svg>
