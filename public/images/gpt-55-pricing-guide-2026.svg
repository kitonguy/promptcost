<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a388"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bgGrad)" width="1200" height="630"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="180" fill="#4f46e5" opacity="0.08"/>
  <circle cx="1100" cy="530" r="200" fill="#00d4aa" opacity="0.06"/>
  <rect x="0" y="580" width="1200" height="50" fill="#0f172a" opacity="0.5"/>
  
  <!-- Main title -->
  <text x="600" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="44" fill="white" text-anchor="middle" font-weight="bold">How Much Does</text>
  <text x="600" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="56" fill="url(#accentGrad)" text-anchor="middle" font-weight="bold">GPT-5.5 Cost?</text>
  <text x="600" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">Complete API Pricing Guide 2026</text>
  
  <!-- Pricing boxes -->
  <rect x="120" y="260" width="300" height="160" rx="16" fill="url(#inputGrad)" opacity="0.9"/>
  <rect x="125" y="265" width="290" height="150" rx="14" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="270" y="310" font-family="system-ui, sans-serif" font-size="18" fill="#c7d2fe" text-anchor="middle">INPUT TOKENS</text>
  <text x="270" y="370" font-family="system-ui, sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="bold">$8.44</text>
  <text x="270" y="405" font-family="system-ui, sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle">per 1M tokens</text>
  
  <rect x="450" y="260" width="300" height="160" rx="16" fill="url(#outputGrad)" opacity="0.9"/>
  <rect x="455" y="265" width="290" height="150" rx="14" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="600" y="310" font-family="system-ui, sans-serif" font-size="18" fill="#a7f3d0" text-anchor="middle">OUTPUT TOKENS</text>
  <text x="600" y="370" font-family="system-ui, sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="bold">$2.81</text>
  <text x="600" y="405" font-family="system-ui, sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">per 1M tokens</text>
  
  <rect x="780" y="260" width="300" height="160" rx="16" fill="#1e293b" opacity="0.9"/>
  <rect x="785" y="265" width="290" height="150" rx="14" fill="none" stroke="#64748b" stroke-width="2"/>
  <text x="930" y="310" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">BLENDED RATE</text>
  <text x="930" y="370" font-family="system-ui, sans-serif" font-size="52" fill="url(#accentGrad)" text-anchor="middle" font-weight="bold">$5.63</text>
  <text x="930" y="405" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">per 1M tokens</text>
  
  <!-- Bottom info -->
  <text x="600" y="490" font-family="system-ui, sans-serif" font-size="22" fill="#e2e8f0" text-anchor="middle">vs Claude Opus 4.7: $55/M blended | vs DeepSeek V4: $0.001/M</text>
  <text x="600" y="525" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">"A potential price war catalyst" — TechCrunch</text>
  
  <!-- Brand -->
  <text x="600" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#475569" text-anchor="middle">promptcost.org</text>
</svg>
