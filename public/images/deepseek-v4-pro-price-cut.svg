<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Badge: 75% OFF -->
  <g transform="translate(950, 80)">
    <rect x="-80" y="-25" width="160" height="50" rx="25" fill="url(#accent)"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e">75% OFF</text>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff">DeepSeek V4-Pro</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="url(#accent)">PRICE CUT 2026</text>
  
  <!-- Price comparison -->
  <g transform="translate(150, 350)">
    <!-- Old price -->
    <g opacity="0.5">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" fill="#888">BEFORE</text>
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="48" fill="#888">$1.74</text>
      <text x="0" y="80" font-family="Arial, sans-serif" font-size="16" fill="#888">per 1M tokens</text>
    </g>
    
    <!-- Arrow -->
    <g transform="translate(200, 20)">
      <polygon points="0,20 40,20 30,10 50,20 30,30 40,20" fill="url(#accent)"/>
    </g>
    
    <!-- New price -->
    <g transform="translate(320, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" fill="#00ff88">NOW</text>
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00ff88">$0.44</text>
      <text x="0" y="80" font-family="Arial, sans-serif" font-size="16" fill="#00ff88">per 1M tokens</text>
    </g>
  </g>
  
  <!-- Stats row -->
  <g transform="translate(100, 520)">
    <g>
      <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff">1M</text>
      <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888">Token Context</text>
    </g>
    <g transform="translate(350, 0)">
      <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff">10x</text>
      <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888">Cheaper than GPT-5.5</text>
    </g>
    <g transform="translate(700, 0)">
      <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff">MIT</text>
      <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888">License</text>
    </g>
  </g>
  
  <!-- Footer branding -->
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#666">promptcost.org</text>
</svg>
