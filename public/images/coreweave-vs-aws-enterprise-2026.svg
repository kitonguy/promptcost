<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="coreweave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="aws" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg6)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">CoreWeave vs AWS Enterprise</text>
  <!-- CoreWeave Card -->
  <rect x="30" y="70" width="360" height="290" rx="12" fill="url(#coreweave)"/>
  <text x="210" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">CoreWeave</text>
  <text x="210" y="130" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="13">GPU-Optimized Cloud</text>
  <text x="210" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="28" font-weight="800">25-35%</text>
  <text x="210" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">cheaper than AWS</text>
  <!-- CoreWeave Specs -->
  <text x="210" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">7 Regions</text>
  <text x="210" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">InfiniBand 400Gbps</text>
  <text x="210" y="265" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">✓ SOC 2, GDPR, HIPAA</text>
  <text x="210" y="285" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">✗ No FedRAMP</text>
  <text x="210" y="305" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">✓ 99.5% SLA</text>
  <text x="210" y="340" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">Best for: Cost-sensitive AI teams</text>
  <!-- AWS Card -->
  <rect x="410" y="70" width="360" height="290" rx="12" fill="url(#aws)"/>
  <text x="590" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">Amazon AWS</text>
  <text x="590" y="130" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="13">Hyperscaler Enterprise</text>
  <text x="590" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="28" font-weight="800">200+</text>
  <text x="590" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">regions worldwide</text>
  <!-- AWS Specs -->
  <text x="590" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">33 Launched Regions</text>
  <text x="590" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">EFA Networking</text>
  <text x="590" y="265" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="12">✓ FedRAMP, SOC 2, HIPAA</text>
  <text x="590" y="285" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="12">✓ PCI-DSS, ISO 27001</text>
  <text x="590" y="305" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="12">✓ 99.9% SLA</text>
  <text x="590" y="340" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="12">Best for: Regulated industries</text>
  <!-- Footer -->
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">CoreWeave: GPU specialization | AWS: Compliance & global scale</text>
</svg>