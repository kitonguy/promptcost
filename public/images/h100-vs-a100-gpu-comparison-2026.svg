<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="h100" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="a100" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">H100 vs A100: Which GPU to Choose?</text>
  <!-- H100 Card -->
  <rect x="30" y="70" width="360" height="290" rx="12" fill="url(#h100)"/>
  <text x="210" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">NVIDIA H100 SXM5</text>
  <text x="210" y="130" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="13">Flagship AI GPU</text>
  <!-- H100 Specs -->
  <rect x="50" y="150" width="140" height="60" rx="8" fill="#166534"/>
  <text x="120" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">80GB</text>
  <text x="120" y="195" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="11">HBM3e VRAM</text>
  <rect x="210" y="150" width="160" height="60" rx="8" fill="#166534"/>
  <text x="290" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">3.35 TB/s</text>
  <text x="290" y="195" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="11">Memory Bandwidth</text>
  <rect x="50" y="225" width="140" height="60" rx="8" fill="#166534"/>
  <text x="120" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">989</text>
  <text x="120" y="270" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="11">TFLOPS FP16</text>
  <rect x="210" y="225" width="160" height="60" rx="8" fill="#166534"/>
  <text x="290" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">$4-5.50</text>
  <text x="290" y="270" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="11">per hour</text>
  <text x="210" y="320" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ TensorRT-LLM support</text>
  <text x="210" y="340" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="12">Best for: Production inference, frontier models</text>
  <!-- A100 Card -->
  <rect x="410" y="70" width="360" height="290" rx="12" fill="url(#a100)"/>
  <text x="590" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">NVIDIA A100 SXM4</text>
  <text x="590" y="130" text-anchor="middle" fill="#fef3c7" font-family="system-ui" font-size="13">Enterprise Sweet Spot</text>
  <!-- A100 Specs -->
  <rect x="430" y="150" width="140" height="60" rx="8" fill="#92400e"/>
  <text x="500" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">80GB</text>
  <text x="500" y="195" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="11">HBM2e VRAM</text>
  <rect x="590" y="150" width="160" height="60" rx="8" fill="#92400e"/>
  <text x="670" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">2 TB/s</text>
  <text x="670" y="195" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="11">Memory Bandwidth</text>
  <rect x="430" y="225" width="140" height="60" rx="8" fill="#92400e"/>
  <text x="500" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">624</text>
  <text x="500" y="270" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="11">TFLOPS FP16</text>
  <rect x="590" y="225" width="160" height="60" rx="8" fill="#92400e"/>
  <text x="670" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="800">$2.45-3.67</text>
  <text x="670" y="270" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="11">per hour</text>
  <text x="590" y="320" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ 40-50% cheaper than H100</text>
  <text x="590" y="340" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="12">Best for: Development, fine-tuning, cost-sensitive</text>
  <!-- Verdict -->
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">H100 = 2x faster for inference | A100 = 40% savings for training/fine-tuning</text>
</svg>