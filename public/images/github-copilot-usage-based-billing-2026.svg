<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Left side content -->
  <text x="60" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" font-weight="500">PROMPTCOST.ORG</text>
  
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#ffffff" font-weight="700">GitHub Copilot</text>
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#ffffff" font-weight="700">Usage-Based</text>
  <text x="60" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="url(#accent)" font-weight="700">Billing 2026</text>
  
  <text x="60" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">What developers actually pay now</text>
  
  <!-- Divider line -->
