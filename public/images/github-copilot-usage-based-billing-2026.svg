    <text x="70" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">COPILOT PRO</text>
    <text x="70" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" font-weight="700" text-anchor="middle">$10</text>
    <text x="110" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">/mo</text>
  </g>
  
  <g transform="translate(220, 380)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#ffffff" opacity="0.1"/>
    <text x="70" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">COPILOT PRO+</text>
    <text x="70" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" font-weight="700" text-anchor="middle">$39</text>
    <text x="110" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">/mo</text>
  </g>
  
