    <text x="70" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fed7aa" text-anchor="middle">COPILOT BUSINESS</text>
    <text x="70" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" font-weight="700" text-anchor="middle">$19</text>
    <text x="110" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">/user</text>
  </g>
  
  <!-- Right side - Key insight -->
