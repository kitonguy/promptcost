    <text x="30" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#f97316" font-weight="600">⚠️ COST IMPACT</text>
    
    <text x="30" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffffff" font-weight="600">Token-based billing replaces</text>
    <text x="30" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffffff" font-weight="600">flat-rate unlimited usage</text>
    
    <rect x="30" y="140" width="340" height="1" fill="#ffffff" opacity="0.2"/>
    
    <text x="30" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Premium models (GPT-5.5,</text>
    <text x="30" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Claude Opus) consume</text>
    <text x="30" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">3-5x more credits than</text>
    <text x="30" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">base models like GPT-4o mini</text>
    
    <text x="30" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#ffffff" font-weight="700">Up to 2.8x cost increase</text>
    <text x="30" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">for heavy enterprise users</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Calculate your AI coding costs at promptcost.org</text>
  
  <!-- GitHub Copilot icon representation -->
  <g transform="translate(1100, 530)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>
    <text x="30" y="37" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">®</text>
  </g>
</svg>