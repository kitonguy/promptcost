<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">GPU Rental Pricing Models</text>
  <!-- On-Demand -->
  <rect x="30" y="70" width="240" height="280" rx="12" fill="#3b82f6"/>
  <text x="150" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">On-Demand</text>
  <text x="150" y="130" text-anchor="middle" fill="#bfdbfe" font-family="system-ui" font-size="12">Highest price, maximum flexibility</text>
  <text x="150" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="32" font-weight="800">100%</text>
  <text x="150" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Base rate</text>
  <text x="150" y="220" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ No commitment</text>
  <text x="150" y="242" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Cancel anytime</text>
  <text x="150" y="264" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Immediate availability</text>
  <text x="150" y="286" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ No risk of overpay</text>
  <text x="150" y="320" text-anchor="middle" fill="#bfdbfe" font-family="system-ui" font-size="11">Use for: Prototyping, &lt;1 month</text>
  <!-- Spot -->
  <rect x="285" y="70" width="240" height="280" rx="12" fill="#f59e0b"/>
  <text x="405" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">Spot Instances</text>
  <text x="405" y="130" text-anchor="middle" fill="#fef3c7" font-family="system-ui" font-size="12">30-50% discount, can be interrupted</text>
  <text x="405" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="32" font-weight="800">50-70%</text>
  <text x="405" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">of on-demand price</text>
  <text x="405" y="220" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Deepest savings</text>
  <text x="405" y="242" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Best for batch training</text>
  <text x="405" y="264" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">✗ Can be interrupted</text>
  <text x="405" y="286" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">✗ Checkpoint required</text>
  <text x="405" y="320" text-anchor="middle" fill="#fef3c7" font-family="system-ui" font-size="11">Use for: Training, experiments</text>
  <!-- Reserved -->
  <rect x="540" y="70" width="240" height="280" rx="12" fill="#22c55e"/>
  <text x="660" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">Reserved</text>
  <text x="660" y="130" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="12">Commit for 1-3 years, best rates</text>
  <text x="660" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="32" font-weight="800">40-60%</text>
  <text x="660" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">discount vs on-demand</text>
  <text x="660" y="220" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Predictable costs</text>
  <text x="660" y="242" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">✓ Guaranteed capacity</text>
  <text x="660" y="264" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">✗ 1-3 year lock-in</text>
  <text x="660" y="286" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">✗ Cancellation fees</text>
  <text x="660" y="320" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="11">Use for: Production, 12+ months</text>
  <!-- Footer -->
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Tip: Start on-demand, switch to reserved when usage stabilizes after 2-3 months</text>
</svg>