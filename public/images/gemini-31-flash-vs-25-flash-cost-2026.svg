<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#6c9fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="#2a4a6f" stroke-width="2"/>
  
  <!-- Header -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="22" fill="#6c9fff" font-weight="bold">PROMPTCOST.ORG</text>
  
  <!-- Main Title -->
  <text x="60" y="165" font-family="Arial, sans-serif" font-size="42" fill="#ffffff" font-weight="bold">Gemini 3.1 Flash vs 2.5 Flash</text>
  <text x="60" y="210" font-family="Arial, sans-serif" font-size="28" fill="#a0b4c8">Google AI Cost Comparison 2026</text>
  
  <!-- Divider -->
  <rect x="60" y="235" width="300" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Key Stats -->
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="20" fill="#6c9fff" font-weight="bold">INPUT COST</text>
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" font-weight="bold">$0.50</text>
  <text x="230" y="340" font-family="Arial, sans-serif" font-size="20" fill="#a0b4c8">/ 1M tokens</text>
  
  <text x="420" y="300" font-family="Arial, sans-serif" font-size="20" fill="#6c9fff" font-weight="bold">OUTPUT COST</text>
  <text x="420" y="340" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" font-weight="bold">$3.00</text>
  <text x="590" y="340" font-family="Arial, sans-serif" font-size="20" fill="#a0b4c8">/ 1M tokens</text>
  
  <!-- Speed Badge -->
  <rect x="780" y="270" width="340" height="110" rx="12" fill="#1a3a5c" stroke="#4285f4" stroke-width="2"/>
  <text x="950" y="310" font-family="Arial, sans-serif" font-size="20" fill="#6c9fff" font-weight="bold" text-anchor="middle">SPEED IMPROVEMENT</text>
  <text x="950" y="360" font-family="Arial, sans-serif" font-size="52" fill="#34a853" font-weight="bold" text-anchor="middle">3x FASTER</text>
  
  <!-- Comparison Table Header -->
  <rect x="60" y="400" width="1080" height="50" rx="8" fill="#1a3a5c"/>
  <text x="180" y="433" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">MODEL</text>
  <text x="500" y="433" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">INPUT</text>
  <text x="700" y="433" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">OUTPUT</text>
  <text x="950" y="433" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">CONTEXT</text>
  
  <!-- Row 1: 3.1 Flash -->
  <rect x="60" y="455" width="1080" height="45" rx="0" fill="#243a55"/>
  <text x="180" y="485" font-family="Arial, sans-serif" font-size="16" fill="#4285f4" font-weight="bold">Gemini 3.1 Flash</text>
  <text x="500" y="485" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">$0.50/M</text>
  <text x="700" y="485" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">$3.00/M</text>
  <text x="950" y="485" font-family="Arial, sans-serif" font-size="16" fill="#34a853">2M tokens</text>
  
  <!-- Row 2: 2.5 Flash -->
  <rect x="60" y="500" width="1080" height="45" rx="0" fill="#1a2a3f"/>
  <text x="180" y="530" font-family="Arial, sans-serif" font-size="16" fill="#a0b4c8">Gemini 2.5 Flash</text>
  <text x="500" y="530" font-family="Arial, sans-serif" font-size="16" fill="#a0b4c8">$0.10/M</text>
  <text x="700" y="530" font-family="Arial, sans-serif" font-size="16" fill="#a0b4c8">$2.50/M</text>
  <text x="950" y="530" font-family="Arial, sans-serif" font-size="16" fill="#a0b4c8">1M tokens</text>
  
  <!-- CTA -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="18" fill="#6c9fff">Calculate your costs at promptcost.org/en/</text>
</svg>
