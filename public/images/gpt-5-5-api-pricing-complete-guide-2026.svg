<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="priceTag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Header badge -->
  <rect x="50" y="30" width="180" height="36" rx="18" fill="#e94560"/>
  <text x="140" y="55" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">MAY 2026 UPDATE</text>
  
  <!-- Main title -->
  <text x="600" y="130" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle">GPT-5.5 API PRICING</text>
  
  <!-- Subtitle -->
  <text x="600" y="175" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Complete Cost Guide for Developers</text>
  
  <!-- Price cards -->
  <g transform="translate(80, 220)">
    <!-- GPT-5.5 card -->
    <rect width="280" height="200" rx="16" fill="url(#priceTag)" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="40" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">GPT-5.5</text>
    <text x="140" y="90" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle">$5.00</text>
    <text x="140" y="115" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">per 1M input tokens</text>
    <text x="140" y="150" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#f97316" text-anchor="middle">$30.00</text>
    <text x="140" y="175" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">per 1M output tokens</text>
  </g>
  
  <g transform="translate(390, 220)">
    <!-- GPT-4o card (comparison) -->
    <rect width="280" height="200" rx="16" fill="url(#priceTag)" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="40" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#4ade80" text-anchor="middle">GPT-4o (Previous)</text>
    <text x="140" y="90" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle">$2.50</text>
    <text x="140" y="115" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">per 1M input tokens</text>
    <text x="140" y="150" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#4ade80" text-anchor="middle">$10.00</text>
    <text x="140" y="175" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">per 1M output tokens</text>
  </g>
  
  <g transform="translate(700, 220)">
    <!-- 2x badge -->
    <rect width="280" height="200" rx="16" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="2"/>
    <text x="140" y="50" font-family="system-ui,sans-serif" font-size="64" font-weight="900" fill="#e94560" text-anchor="middle">2X</text>
    <text x="140" y="95" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">PRICE INCREASE</text>
    <text x="140" y="130" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">vs GPT-4o</text>
    <text x="140" y="170" font-family="system-ui,sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">Marginal benchmarks?</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0f3460"/>
  <text x="80" y="600" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#ffffff">promptcost.org</text>
  <text x="500" y="600" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Compare all models at</text>
  <text x="750" y="600" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#60a5fa">OpenRouter Prices Updated Daily</text>
  <text x="1100" y="600" font-family="system-ui,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">May 2026</text>
</svg>