<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="ondemand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="spot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg9)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">Spot Instances: Save 40-60% on GPU Rental</text>
  <!-- On-Demand -->
  <rect x="30" y="70" width="360" height="200" rx="12" fill="url(#ondemand)"/>
  <text x="210" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="700">On-Demand GPU</text>
  <text x="210" y="140" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="36" font-weight="800">$5.50/hr</text>
  <text x="210" y="170" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="14">H100 80GB</text>
  <text x="210" y="195" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ No interruption risk</text>
  <text x="210" y="215" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ Guaranteed availability</text>
  <text x="210" y="250" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">Use for: Production inference</text>
  <!-- Spot -->
  <rect x="410" y="70" width="360" height="200" rx="12" fill="url(#spot)"/>
  <text x="590" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="700">Spot GPU</text>
  <text x="590" y="140" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="36" font-weight="800">$2.99/hr</text>
  <text x="590" y="170" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="14">H100 80GB (46% savings)</text>
  <text x="590" y="195" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ 30-50% cheaper</text>
  <text x="590" y="215" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">✓ Same hardware</text>
  <text x="590" y="250" text-anchor="middle" fill="#bbf7d0" font-family="system-ui" font-size="12">Use for: Batch training</text>
  <!-- Checkpoint Warning -->
  <rect x="30" y="290" width="740" height="90" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="16" font-weight="700">⚠️ Requires Checkpointing Infrastructure</text>
  <text x="400" y="345" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13">Spot instances can be interrupted with 30sec-2min notice. Save checkpoints every 100-500 steps.</text>
  <text x="400" y="365" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="12">With proper checkpointing: lose 5-10 min of work | Without: lose entire training run</text>
</svg>