<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect fill="#0f172a" width="1200" height="630"/>

  <!-- Header -->
  <text x="600" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="500">CODING BENCHMARK RESULTS 2026</text>

  <!-- Main title -->
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="44" fill="#f97316" text-anchor="middle" font-weight="800">Kimi K2.6</text>
  <text x="600" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#fdba74" text-anchor="middle">Coding Benchmark Winner</text>

  <!-- Divider line -->
  <line x1="200" y1="205" x2="1000" y2="205" stroke="#334155" stroke-width="1"/>

  <!-- Benchmark bars section -->
  <!-- HumanEval+ -->
  <text x="60" y="250" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">HumanEval+</text>
  <rect x="200" y="235" width="680" height="28" rx="4" fill="#1e293b"/>
  <rect x="200" y="235" width="680" height="28" rx="4" fill="#f97316"/>
  <text x="890" y="255" font-family="system-ui, sans-serif" font-size="14" fill="#f97316" font-weight="700">K2.6: 96.2%</text>

  <rect x="200" y="270" width="620" height="20" rx="4" fill="#1e293b"/>
  <rect x="200" y="270" width="620" height="20" rx="4" fill="#8b5cf6"/>
  <text x="830" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#a78bfa">Claude Opus 4.7: 94.1%</text>

  <rect x="200" y="295" width="555" height="20" rx="4" fill="#1e293b"/>
  <rect x="200" y="295" width="555" height="20" rx="4" fill="#3b82f6"/>
  <text x="765" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa">GPT-5.5: 89.8%</text>

  <!-- SWE-Bench -->
  <text x="60" y="365" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">SWE-Bench</text>
  <rect x="200" y="350" width="680" height="28" rx="4" fill="#1e293b"/>
  <rect x="200" y="350" width="612" height="28" rx="4" fill="#f97316"/>
  <text x="822" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#f97316" font-weight="700">K2.6: 78.4%</text>

  <rect x="200" y="385" width="544" height="20" rx="4" fill="#1e293b"/>
  <rect x="200" y="385" width="544" height="20" rx="4" fill="#8b5cf6"/>
  <text x="754" y="400" font-family="system-ui, sans-serif" font-size="12" fill="#a78bfa">Claude Opus 4.7: 71.2%</text>

  <rect x="200" y="410" width="483" height="20" rx="4" fill="#1e293b"/>
  <rect x="200" y="410" width="483" height="20" rx="4" fill="#3b82f6"/>
  <text x="693" y="425" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa">GPT-5.5: 63.5%</text>

  <!-- Bottom comparison boxes -->
  <rect x="60" y="460" width="340" height="120" rx="12" fill="#1e293b"/>
  <rect x="60" y="460" width="340" height="120" rx="12" stroke="#f97316" stroke-width="2" fill="none"/>
  <text x="230" y="500" font-family="system-ui, sans-serif" font-size="18" fill="#f97316" text-anchor="middle" font-weight="700">Kimi K2.6</text>
  <text x="230" y="530" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">$0.12 / 1M tokens</text>
  <text x="230" y="555" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Best for: Code Generation</text>

  <rect x="430" y="460" width="340" height="120" rx="12" fill="#1e293b"/>
  <text x="600" y="500" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="700">Claude Opus 4.7</text>
  <text x="600" y="530" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">$15 / 1M tokens</text>
  <text x="600" y="555" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Best for: Complex Reasoning</text>

  <rect x="800" y="460" width="340" height="120" rx="12" fill="#1e293b"/>
  <text x="970" y="500" font-family="system-ui, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle" font-weight="700">GPT-5.5</text>
  <text x="970" y="530" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">$7.50 / 1M tokens</text>
  <text x="970" y="555" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Best for: General Purpose</text>

  <!-- Footer -->
  <text x="600" y="610" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">promptcost.org — AI Model Pricing &amp; Benchmark Tracker</text>
