<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Title area -->
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff">AI Agents Need</text>
  <text x="60" y="135" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2ea043">Control Flow</text>
  <text x="60" y="175" font-family="Arial, sans-serif" font-size="24" fill="#8b949e" font-style="italic">Not Better Prompts</text>

  <!-- Subtitle -->
  <text x="60" y="215" font-family="Arial, sans-serif" font-size="20" fill="#6e7681">The architecture shift that cuts agent costs by 60-90%</text>

  <!-- Architecture diagram -->
  <!-- Input node -->
  <rect x="60" y="260" width="180" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="2"/>
  <text x="150" y="295" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">USER TASK</text>
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Classification</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="295" x2="290" y2="295" stroke="#238636" stroke-width="3"/>
  <polygon points="295,295 285,290 285,300" fill="#238636"/>

  <!-- Router node -->
  <rect x="300" y="260" width="200" height="70" rx="8" fill="#21262d" stroke="#238636" stroke-width="2"/>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">ROUTER</text>
  <text x="400" y="308" font-family="Arial, sans-serif" font-size="12" fill="#2ea043" text-anchor="middle">Route to cheapest capable</text>
  <text x="400" y="322" font-family="Arial, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">Max 7 steps</text>

  <!-- Arrow to cheap path -->
  <line x1="500" y1="270" x2="540" y2="240" stroke="#238636" stroke-width="2"/>
  <polygon points="545,237 535,235 540,245" fill="#238636"/>

  <!-- Arrow to mid path -->
  <line x1="500" y1="295" x2="600" y2="295" stroke="#1f6feb" stroke-width="2"/>
  <polygon points="605,295 595,290 595,300" fill="#1f6feb"/>

  <!-- Arrow to frontier -->
  <line x1="500" y1="320" x2="540" y2="350" stroke="#f0883e" stroke-width="2"/>
  <polygon points="545,355 535,353 540,343" fill="#f0883e"/>

  <!-- Cheap model -->
  <rect x="550" y="200" width="220" height="70" rx="8" fill="#0d1f0d" stroke="#238636" stroke-width="2"/>
  <text x="660" y="230" font-family="Arial, sans-serif" font-size="13" fill="#2ea043" text-anchor="middle">Gemini 2.5 Flash</text>
  <text x="660" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">$0.10/M</text>
  <text x="660" y="265" font-family="Arial, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">80% of tasks</text>

  <!-- Mid model -->
  <rect x="610" y="260" width="220" height="70" rx="8" fill="#0d1a2f" stroke="#1f6feb" stroke-width="2"/>
  <text x="720" y="290" font-family="Arial, sans-serif" font-size="13" fill="#388bfd" text-anchor="middle">Qwen 3.6 Max</text>
  <text x="720" y="312" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">$1.04/M</text>
  <text x="720" y="325" font-family="Arial, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">15% of tasks</text>

  <!-- Frontier model -->
  <rect x="550" y="360" width="220" height="70" rx="8" fill="#2f1a0d" stroke="#f0883e" stroke-width="2"/>
  <text x="660" y="390" font-family="Arial, sans-serif" font-size="13" fill="#f0883e" text-anchor="middle">Claude Opus 4.7</text>
  <text x="660" y="412" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">$15.00/M</text>
  <text x="660" y="425" font-family="Arial, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">5% of tasks</text>

  <!-- Merge arrows -->
  <line x1="770" y1="235" x2="870" y2="295" stroke="#30363d" stroke-width="2"/>
  <line x1="830" y1="295" x2="870" y2="295" stroke="#30363d" stroke-width="2"/>
  <line x1="770" y1="395" x2="870" y2="295" stroke="#30363d" stroke-width="2"/>

  <!-- Output -->
  <rect x="880" y="260" width="180" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="2"/>
  <text x="970" y="290" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">RESPONSE</text>
  <text x="970" y="310" font-family="Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Quality Check</text>
  <text x="970" y="325" font-family="Arial, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">Kill Switch: 7 steps</text>

  <!-- Cost comparison boxes -->
  <rect x="60" y="470" width="350" height="130" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f85149">OLD APPROACH</text>
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="14" fill="#8b949e">Prompt-only (GPT-4o)</text>
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#f85149">$0.85/task</text>
  <text x="80" y="585" font-family="Arial, sans-serif" font-size="13" fill="#6e7681">High latency, medium reliability</text>

  <rect x="430" y="470" width="350" height="130" rx="8" fill="#0d2818" stroke="#238636" stroke-width="2"/>
  <text x="450" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2ea043">NEW APPROACH</text>
  <text x="450" y="530" font-family="Arial, sans-serif" font-size="14" fill="#8b949e">Control flow + routing</text>
  <text x="450" y="555" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#3fb950">$0.04/task</text>
  <text x="450" y="585" font-family="Arial, sans-serif" font-size="13" fill="#6e7681">Low latency, high reliability</text>

  <rect x="800" y="470" width="340" height="130" rx="8" fill="#0d1f0d" stroke="#238636" stroke-width="2"/>
  <text x="820" y="505" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#3fb950">94%</text>
  <text x="820" y="535" font-family="Arial, sans-serif" font-size="16" fill="#2ea043">Cost Reduction</text>
  <text x="820" y="565" font-family="Arial, sans-serif" font-size="14" fill="#8b949e">Architecture over prompting</text>
  <text x="820" y="585" font-family="Arial, sans-serif" font-size="12" fill="#6e7681">Same quality, 1/17th the cost</text>

  <!-- Branding -->
  <text x="1080" y="615" font-family="Arial, sans-serif" font-size="16" fill="#444">promptcost.org</text>
</svg>
