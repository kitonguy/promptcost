<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="ds" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="op" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#2c3e50" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Logo -->
  <text x="60" y="65" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d" font-weight="bold">PromptCost.org</text>

  <!-- Title -->
  <text x="60" y="140" font-family="Arial, sans-serif" font-size="46" fill="#ffffff" font-weight="bold">DeepSeek V4 Pro</text>
  <text x="60" y="195" font-family="Arial, sans-serif" font-size="36" fill="#00d4aa">vs</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="46" fill="#a29bfe" font-weight="bold">GPT-5.5 Pro</text>

  <!-- VS circle -->
  <circle cx="570" cy="165" r="30" fill="#2c3e50"/>
  <text x="570" y="175" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">VS</text>

  <!-- Cost comparison boxes -->
  <rect x="60" y="250" width="520" height="160" rx="12" fill="#0a2a20" stroke="#00d4aa" stroke-width="2"/>
  <text x="90" y="295" font-family="Arial, sans-serif" font-size="22" fill="#00d4aa" font-weight="bold">DeepSeek V4 Pro</text>
  <text x="90" y="340" font-family="Arial, sans-serif" font-size="40" fill="#ffffff" font-weight="bold">$0.000435</text>
  <text x="340" y="340" font-family="Arial, sans-serif" font-size="20" fill="#95a5a6">/M input</text>
  <text x="90" y="380" font-family="Arial, sans-serif" font-size="28" fill="#b2bec3">69x cheaper</text>

  <rect x="620" y="250" width="520" height="160" rx="12" fill="#1a1a3a" stroke="#a29bfe" stroke-width="2"/>
  <text x="650" y="295" font-family="Arial, sans-serif" font-size="22" fill="#a29bfe" font-weight="bold">GPT-5.5 Pro</text>
  <text x="650" y="340" font-family="Arial, sans-serif" font-size="40" fill="#ffffff" font-weight="bold">$0.030</text>
  <text x="880" y="340" font-family="Arial, sans-serif" font-size="20" fill="#95a5a6">/M input</text>
  <text x="650" y="380" font-family="Arial, sans-serif" font-size="28" fill="#b2bec3">Benchmark leader</text>

  <!-- Key stats row -->
  <rect x="60" y="440" width="180" height="100" rx="8" fill="#1e3a5f" opacity="0.7"/>
  <text x="150" y="480" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">69x</text>
  <text x="150" y="515" font-family="Arial, sans-serif" font-size="16" fill="#b2bec3" text-anchor="middle">Input cost gap</text>

  <rect x="270" y="440" width="180" height="100" rx="8" fill="#1e3a5f" opacity="0.7"/>
  <text x="360" y="480" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">128K</text>
  <text x="360" y="515" font-family="Arial, sans-serif" font-size="16" fill="#b2bec3" text-anchor="middle">GPT-5 context</text>

  <rect x="480" y="440" width="180" height="100" rx="8" fill="#1e3a5f" opacity="0.7"/>
  <text x="570" y="480" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">64K</text>
  <text x="570" y="515" font-family="Arial, sans-serif" font-size="16" fill="#b2bec3" text-anchor="middle">DeepSeek context</text>

  <rect x="690" y="440" width="180" height="100" rx="8" fill="#0a2a20" opacity="0.8"/>
  <text x="780" y="480" font-family="Arial, sans-serif" font-size="32" fill="#00d4aa" text-anchor="middle" font-weight="bold">80%</text>
  <text x="780" y="515" font-family="Arial, sans-serif" font-size="16" fill="#b2bec3" text-anchor="middle">Routing savings</text>

  <rect x="900" y="440" width="180" height="100" rx="8" fill="#1a1a3a" opacity="0.8"/>
  <text x="990" y="480" font-family="Arial, sans-serif" font-size="32" fill="#a29bfe" text-anchor="middle" font-weight="bold">88%</text>
  <text x="990" y="515" font-family="Arial, sans-serif" font-size="16" fill="#b2bec3" text-anchor="middle">GPT MATH score</text>

  <!-- Bottom -->
  <text x="60" y="590" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Compare all models at promptcost.org/en/</text>
</svg>
