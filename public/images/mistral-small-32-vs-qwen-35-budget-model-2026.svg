<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="mistral" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="qwen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Header -->
  <text x="60" y="75" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff">
    Mistral Small 3.2 vs Qwen 3.5
  </text>
  <text x="60" y="115" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8">
    The 24B Budget Model Showdown
  </text>
  
  <!-- VS Badge -->
  <circle cx="600" cy="300" r="50" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="310" font-family="system-ui, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff">VS</text>
  
  <!-- Mistral Card -->
  <rect x="60" y="160" width="480" height="280" rx="16" fill="#1e293b"/>
  <rect x="60" y="160" width="480" height="8" rx="4" fill="url(#mistral)"/>
  <text x="100" y="210" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#f472b6">Mistral Small 3.2</text>
  <text x="100" y="250" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">22B parameters</text>
  
  <g font-family="system-ui, sans-serif">
    <text x="100" y="300" font-size="16" fill="#94a3b8">Input Cost</text>
    <text x="100" y="335" font-size="36" font-weight="700" fill="#ffffff">$0.15</text>
    <text x="200" y="335" font-size="16" fill="#64748b">/M tokens</text>
    
    <text x="100" y="375" font-size="16" fill="#94a3b8">Output Cost</text>
    <text x="100" y="410" font-size="36" font-weight="700" fill="#ffffff">$0.60</text>
    <text x="260" y="410" font-size="16" fill="#64748b">/M tokens</text>
  </g>
  
  <!-- Qwen Card -->
  <rect x="660" y="160" width="480" height="280" rx="16" fill="#1e293b"/>
  <rect x="660" y="160" width="480" height="8" rx="4" fill="url(#qwen)"/>
  <text x="700" y="210" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#a855f7">Qwen 3.5</text>
  <text x="700" y="250" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">24B parameters</text>
  
  <g font-family="system-ui, sans-serif">
    <text x="700" y="300" font-size="16" fill="#94a3b8">Input Cost</text>
    <text x="700" y="335" font-size="36" font-weight="700" fill="#ffffff">$0.27</text>
    <text x="810" y="335" font-size="16" fill="#64748b">/M tokens</text>
    
    <text x="700" y="375" font-size="16" fill="#94a3b8">Output Cost</text>
    <text x="700" y="410" font-size="36" font-weight="700" fill="#ffffff">$0.80</text>
    <text x="870" y="410" font-size="16" fill="#64748b">/M tokens</text>
  </g>
  
  <!-- Winner Badge -->
  <rect x="900" y="200" width="180" height="50" rx="25" fill="#22c55e"/>
  <text x="990" y="233" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#ffffff">80% CHEAPER</text>
  
  <!-- Bottom comparison -->
  <rect x="60" y="480" width="1080" height="100" rx="12" fill="#0f172a"/>
  <g font-family="system-ui, sans-serif" font-size="15">
    <text x="120" y="515" fill="#64748b">Context Window</text>
    <text x="120" y="545" font-weight="600" fill="#ffffff">32K vs 32K</text>
    
    <text x="350" y="515" fill="#64748b">Benchmarks</text>
    <text x="350" y="545" font-weight="600" fill="#ffffff">Similar</text>
    
    <text x="550" y="515" fill="#64748b">Speed</text>
    <text x="550" y="545" font-weight="600" fill="#22c55e">Mistral 2x faster</text>
    
    <text x="800" y="515" fill="#64748b">Best For</text>
    <text x="800" y="545" font-weight="600" fill="#ffffff">Budget Production</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">promptcost.org</text>
  <text x="1140" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#64748b" text-anchor="end">2026</text>
</svg>