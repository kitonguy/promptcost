<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg7)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">Hidden GPU Cloud Costs</text>
  <!-- Cost Categories -->
  <!-- Egress -->
  <rect x="30" y="70" width="175" height="180" rx="10" fill="#dc2626"/>
  <text x="117" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">EGRESS FEES</text>
  <text x="117" y="130" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="24" font-weight="800">10-25%</text>
  <text x="117" y="155" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="12">of total bill</text>
  <text x="117" y="180" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">$0.01-0.09/GB</text>
  <text x="117" y="200" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="11">Vast.ai lowest</text>
  <text x="117" y="220" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="11">RunPod 5x higher</text>
  <!-- Storage -->
  <rect x="220" y="70" width="175" height="180" rx="10" fill="#ea580c"/>
  <text x="307" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">STORAGE</text>
  <text x="307" y="130" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="24" font-weight="800">$5-100</text>
  <text x="307" y="155" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="12">per month</text>
  <text x="307" y="180" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">$0.05-0.10/GB/mo</text>
  <text x="307" y="200" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="11">1TB dataset</text>
  <text x="307" y="220" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="11">= $50-100/mo</text>
  <!-- Cold Start -->
  <rect x="410" y="70" width="175" height="180" rx="10" fill="#7c3aed"/>
  <text x="497" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">COLD STARTS</text>
  <text x="497" y="130" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="24" font-weight="800">$0.12</text>
  <text x="497" y="155" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">per H100 cold start</text>
  <text x="497" y="180" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">RunPod charges</text>
  <text x="497" y="200" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="11">full init time</text>
  <text x="497" y="220" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="11">Other providers free</text>
  <!-- Spot Overhead -->
  <rect x="600" y="70" width="175" height="180" rx="10" fill="#0891b2"/>
  <text x="687" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">SPOT OVERHEAD</text>
  <text x="687" y="130" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="24" font-weight="800">15-30%</text>
  <text x="687" y="155" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12">additional cost</text>
  <text x="687" y="180" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">Checkpoint writes</text>
  <text x="687" y="200" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="11">Resume overhead</text>
  <text x="687" y="220" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="11">Interruption loss</text>
  <!-- True Cost Calculator -->
  <rect x="30" y="270" width="740" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="14" font-weight="700">TRUE COST FORMULA</text>
  <text x="400" y="325" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12">True Hourly Cost = Base Rate × (1 + Egress Factor + Storage Factor + Overhead Factor)</text>
  <text x="400" y="350" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="16" font-weight="700">Effective Cost: $2.40/hr × 1.25 = $3.00/hr true cost</text>
  <text x="400" y="370" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="11">Budget 20-30% above base rate for true cost</text>
</svg>