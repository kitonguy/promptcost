<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#69f0ae"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#ffab40"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2979ff"/>
      <stop offset="100%" style="stop-color:#82b1ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="#2a3a5f" stroke-width="2"/>
  
  <!-- Header -->
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="22" fill="#82b1ff" font-weight="bold">PROMPTCOST.ORG</text>
  
  <!-- Title -->
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="38" fill="#ffffff" font-weight="bold">Multi-Model Routing Architecture</text>
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="24" fill="#a0aec0">Cut AI Costs 60% With Smart Routing</text>
  
  <!-- Central Router Box -->
  <rect x="460" y="230" width="280" height="120" rx="12" fill="#1a2744" stroke="#2979ff" stroke-width="3"/>
  <text x="600" y="275" font-family="Arial, sans-serif" font-size="18" fill="#82b1ff" font-weight="bold" text-anchor="middle">QUERY ROUTER</text>
  <text x="600" y="305" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">Classifier + Model Selection</text>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="12" fill="#69f0ae" text-anchor="middle">11ms latency</text>
  
  <!-- Input Arrow -->
  <polygon points="300,290 460,290 440,280 460,290 440,300" fill="#ffffff"/>
  <text x="380" y="270" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Your Query</text>
  
  <!-- Tier 1 Output -->
  <rect x="60" y="380" width="200" height="100" rx="10" fill="#0d3320" stroke="#00c853" stroke-width="2"/>
  <text x="160" y="415" font-family="Arial, sans-serif" font-size="16" fill="#00c853" font-weight="bold" text-anchor="middle">TIER 1</text>
  <text x="160" y="440" font-family="Arial, sans-serif" font-size="13" fill="#69f0ae" text-anchor="middle">DeepSeek V3</text>
  <text x="160" y="462" font-family="Arial, sans-serif" font-size="18" fill="#00c853" font-weight="bold" text-anchor="middle">$0.14/M</text>
  
  <!-- Tier 2 Output -->
  <rect x="340" y="380" width="200" height="100" rx="10" fill="#1a3020" stroke="#ffab40" stroke-width="2"/>
  <text x="440" y="415" font-family="Arial, sans-serif" font-size="16" fill="#ffab40" font-weight="bold" text-anchor="middle">TIER 2</text>
  <text x="440" y="440" font-family="Arial, sans-serif" font-size="13" fill="#ffab40" text-anchor="middle">GPT-4o mini</text>
  <text x="440" y="462" font-family="Arial, sans-serif" font-size="18" fill="#ff6d00" font-weight="bold" text-anchor="middle">$0.15/M</text>
  
  <!-- Tier 3 Output -->
  <rect x="620" y="380" width="200" height="100" rx="10" fill="#2a1a20" stroke="#ff5252" stroke-width="2"/>
  <text x="720" y="415" font-family="Arial, sans-serif" font-size="16" fill="#ff5252" font-weight="bold" text-anchor="middle">TIER 3</text>
  <text x="720" y="440" font-family="Arial, sans-serif" font-size="13" fill="#ff5252" text-anchor="middle">GPT-4o</text>
  <text x="720" y="462" font-family="Arial, sans-serif" font-size="18" fill="#ff5252" font-weight="bold" text-anchor="middle">$2.50/M</text>
  
  <!-- Arrows from router to tiers -->
  <line x1="500" y1="290" x2="160" y2="380" stroke="#00c853" stroke-width="3" stroke-dasharray="8,4"/>
  <line x1="600" y1="350" x2="440" y2="380" stroke="#ffab40" stroke-width="3" stroke-dasharray="8,4"/>
  <line x1="700" y1="290" x2="720" y2="380" stroke="#ff5252" stroke-width="3" stroke-dasharray="8,4"/>
  
  <!-- Results Panel -->
  <rect x="900" y="230" width="240" height="250" rx="12" fill="#0d1a2e" stroke="#2a3a5f" stroke-width="2"/>
  <text x="1020" y="265" font-family="Arial, sans-serif" font-size="16" fill="#82b1ff" font-weight="bold" text-anchor="middle">MONTHLY RESULTS</text>
  
  <text x="940" y="300" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">Before routing:</text>
  <text x="1100" y="300" font-family="Arial, sans-serif" font-size="16" fill="#ff5252" font-weight="bold">$127,000</text>
  
  <text x="940" y="340" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">After routing:</text>
  <text x="1100" y="340" font-family="Arial, sans-serif" font-size="16" fill="#69f0ae" font-weight="bold">$48,200</text>
  
  <rect x="940" y="360" width="160" height="5" rx="2" fill="#1a1a2e"/>
  <rect x="940" y="360" width="60" height="5" rx="2" fill="url(#green)"/>
  
  <text x="940" y="400" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">Savings:</text>
  <text x="1100" y="400" font-family="Arial, sans-serif" font-size="28" fill="#00c853" font-weight="bold">62%</text>
  
  <text x="940" y="440" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">Queries/day:</text>
  <text x="1100" y="440" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">2M</text>
  
  <!-- CTA -->
  <text x="60" y="570" font-family="Arial, sans-serif" font-size="18" fill="#82b1ff">Build your routing system at promptcost.org/en/</text>
  
  <!-- Speed note -->
  <text x="900" y="510" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">P50 latency: 1.4s (vs 2.1s)</text>
</svg>
