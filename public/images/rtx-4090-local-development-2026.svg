<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="local" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg8)"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="700">RTX 4090: Local vs Cloud Decision</text>
  <!-- Local Card -->
  <rect x="30" y="70" width="360" height="290" rx="12" fill="url(#local)"/>
  <text x="210" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">Own RTX 4090</text>
  <text x="210" y="130" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="13">One-Time Purchase</text>
  <text x="210" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="32" font-weight="800">$1,600</text>
  <text x="210" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">+ $39-80/mo electricity</text>
  <!-- Local Specs -->
  <text x="210" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">24GB VRAM</text>
  <text x="210" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">450W TDP</text>
  <text x="210" y="265" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12">✓ Instant availability</text>
  <text x="210" y="285" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12">✓ No cloud waiting</text>
  <text x="210" y="305" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12">✓ Works offline</text>
  <text x="210" y="340" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12">Best for: 8+ hours/day use</text>
  <!-- Cloud Card -->
  <rect x="410" y="70" width="360" height="290" rx="12" fill="url(#cloud)"/>
  <text x="590" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="800">Cloud Vast.ai</text>
  <text x="590" y="130" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="13">Pay Per Hour</text>
  <text x="590" y="165" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="32" font-weight="800">$0.35</text>
  <text x="590" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">per hour RTX 4090 spot</text>
  <!-- Cloud Specs -->
  <text x="590" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">Elastic scaling</text>
  <text x="590" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">Access to A100/H100</text>
  <text x="590" y="265" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">✓ No hardware mgmt</text>
  <text x="590" y="285" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">✓ No upfront cost</text>
  <text x="590" y="305" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">✓ Burst to larger GPUs</text>
  <text x="590" y="340" text-anchor="middle" fill="#ddd6fe" font-family="system-ui" font-size="12">Best for: &lt;8 hours/day use</text>
  <!-- Break-even -->
  <rect x="200" y="370" width="400" height="25" rx="6" fill="#1e293b"/>
  <text x="400" y="387" text-anchor="middle" fill="#fef08a" font-family="system-ui" font-size="12">Break-even: ~8 hours/day at $0.12/kWh electricity</text>
</svg>