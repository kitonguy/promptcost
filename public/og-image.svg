<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="textBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative grid -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Dollar coin icon -->
  <g transform="translate(180, 315)">
    <circle cx="0" cy="0" r="100" fill="#22c55e" opacity="0.08"/>
    <circle cx="0" cy="0" r="80" fill="url(#coin)"/>
    <circle cx="0" cy="0" r="64" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <text x="0" y="28" font-family="system-ui, sans-serif" font-size="80" font-weight="800" fill="white" text-anchor="middle">$</text>
  </g>
  <!-- Main text: PromptCost -->
  <text x="360" y="270" font-family="system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#textBlue)">PromptCost</text>
  <text x="360" y="340" font-family="system-ui, sans-serif" font-size="36" fill="#10b981">.org</text>
  <!-- Tagline -->
  <text x="360" y="400" font-family="system-ui, sans-serif" font-size="28" fill="#64748b">AI Token Calculator &amp; Model Cost Comparison</text>
  <!-- Stats badges -->
  <g transform="translate(360, 450)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="#1e293b" stroke="#334155"/>
    <text x="80" y="32" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">200+ Models</text>
  </g>
  <g transform="translate(540, 450)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="#1e293b" stroke="#334155"/>
    <text x="80" y="32" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">Live Pricing</text>
  </g>
  <g transform="translate(720, 450)">
    <rect x="0" y="0" width="120" height="50" rx="25" fill="#1e293b" stroke="#334155"/>
    <text x="60" y="32" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">Free</text>
  </g>
</svg>